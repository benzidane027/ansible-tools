---
- name: Monitor Odoo servers
  hosts: all
  gather_facts: false

  tasks:

    - name: Check Odoo login page
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/web/login"
        method: GET
        status_code: 200
        timeout: 10
        return_content: false
      register: odoo_check
      ignore_errors: true

    - name: Add failed server to alert list
      ansible.builtin.set_fact:
        failed_servers: "{{ hostvars['localhost']['failed_servers'] | default([]) + [inventory_hostname ~ ' (' ~ ansible_host ~ ')'] }}"
      when: odoo_check is failed
      delegate_to: localhost
      delegate_facts: true

    - name: Send email alert
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | int }}"
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASSWORD') }}"
        from: "{{ lookup('env', 'SMTP_USER') }}"
        to: "{{ lookup('env', 'ALERT_EMAIL').split(',') }}"
        subject: "Odoo Monitoring Alert"
        body: |
          The following Odoo servers are unavailable:

          {% for server in hostvars['localhost']['failed_servers'] %}
          - {{ server }}
          {% endfor %}

        secure: starttls
      delegate_to: localhost
      run_once: true
      when:
        - hostvars['localhost']['failed_servers'] is defined
        - hostvars['localhost']['failed_servers'] | length > 0