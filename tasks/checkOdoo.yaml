---
- name: Check Odoo servers
  hosts: all
  gather_facts: false

  tasks:

    - name: Check SSH connectivity
      ansible.builtin.ping:

    - name: Check NGINX service
      ansible.builtin.systemd:
        name: nginx
      register: nginx_status

    - name: Verify NGINX is active
      ansible.builtin.assert:
        that:
          - nginx_status.status.ActiveState == "active"

    - name: Check Odoo HTTP endpoint
      ansible.builtin.uri:
        url: "{{ odoo_url }}/web/login"
        method: GET
        status_code: 200
        validate_certs: true
        timeout: 10
      register: web_check

    - name: Verify login page
      ansible.builtin.assert:
        that:
          - "'Odoo' in web_check.content"