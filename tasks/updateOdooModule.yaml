# update_module.yml
- hosts: all
  serial: 1
  gather_facts: no
  vars:
    target_database: "{{ database | default(main_database | default('')) }}"
  tasks:
    - name: Fail with clear message if no database resolvable
      fail:
        msg: "No 'database' passed and no 'main_database' set in inventory for {{ inventory_hostname }}"
      when: target_database == ""

    - name: Run to_update alias
      shell: bash -ic "to_update {{ target_database }} {{ module_name }}"
      register: result

    - name: Show output
      debug:
        var: result.stdout_lines