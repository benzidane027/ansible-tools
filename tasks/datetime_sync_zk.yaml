---
- name: Sync ZKTeco device clocks to Algerian time
  hosts: zkteco_devices
  gather_facts: false

  tasks:
    - name: Create virtualenv for ZKTeco sync
      command: python3 -m venv /tmp/zk_venv
      args:
        creates: /tmp/zk_venv/bin/python3
      delegate_to: localhost
      run_once: true

    - name: Ensure pip is present inside the virtualenv
      command: /tmp/zk_venv/bin/python3 -m ensurepip --upgrade
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Install pyzk and tzdata inside virtualenv
      command: /tmp/zk_venv/bin/pip install pyzk tzdata
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Copy sync script to control node working dir
      copy:
        src: python/sync_zk_time.py
        dest: /tmp/sync_zk_time.py
        mode: "0755"
      delegate_to: localhost

    - name: Sync device time for {{ inventory_hostname }} ({{ zk_ip }})
      command: >
        /tmp/zk_venv/bin/python3 /tmp/sync_zk_time.py {{ zk_ip }} {{ zk_port }} {{ zk_password }}
      delegate_to: localhost
      register: zk_result
      changed_when: "'OK' in zk_result.stdout"
      failed_when: "'FAIL' in zk_result.stdout"

    - name: Show result
      debug:
        msg: "{{ zk_result.stdout }}"