---
- name: restart Odoo and Nginx
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: Restart Nginx
      ansible.builtin.command:
        cmd: docker compose restart
        chdir: "/home/{{ ansible_user }}/service.proxy"

    - name: Restart Odoo
      ansible.builtin.command:
        cmd: docker compose restart
        chdir: "/home/{{ ansible_user }}/service.gisb"